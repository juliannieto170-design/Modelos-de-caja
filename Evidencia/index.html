<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card Profile</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #E5E6E8;
        }

        .card {
            display: block;
            width: 300px;
            height: 400px;
            background-color: #fff;
            margin: 20px auto;
            overflow: hidden;
            border-radius: 15px; /* Le agregué un poco de borde a la tarjeta */
        }

        /* CORRECCIÓN: Doble guion bajo para que coincida con el HTML */
        .card__company {
            height: 100px;
            background-color: rgb(107, 201, 198);
        }

        .card__flag {
            display: block;
            width: 100%;
            height: 50px;
            background-color: rgb(56, 56, 58);
        }

        .card__image {
            display: block;
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: white solid 5px;
            margin-top: -75px; /* Ajustado para que quede a la mitad de la franja oscura */
            margin-left: auto;
            margin-right: auto;
            position: relative; /* Para asegurar que se vea por encima */
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="card__company"></div>
        <div class="card__flag"></div>
        <img class="card__image" src="retrato.jpg" alt="Perfil">
    </div>
</body>
</html>
