<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        /*reseteo de estilos */
        /*los navegadores vienen con 
        estilos por defecto, 
        el reset de estilos es para eliminar esos e
        stilos se aplicarian nuestros estilos segun
        hemos diseñado::
         */
            *{
                margin: 0;
                padding: 0 ;

            }
                
        .padre{
            display:block;
            background-color: skyblue;
            width: 400px;
            height: auto;
            /*short hand*/
            padding: 20px 0px 35px 0px;
            border:rgb(0, 16, 163)10px double;
            margin-top :100px;
            margin-left: 220px;
    
            
        }
        .hijo{
            display:block;
            background-color: cadetblue;
            width: 200px;
            height: 200px;
            padding-top: 20px;
            border-top:rgb(0, 16, 163)10px double;
            border-right-width: 20px;
            border-right-style: dotted;
            border-right-color: rgb(0, 163, 114);
            margin-bottom:50px;
            margin: 20px auto;
            margin-bottom: 50px;
            
        }
        .hijo2{
            margin-top: -200px;
        }

    </style>
</head>
<body>
    <div class="padre">
         <div class="hijo">hijo</div>
         <div class="hijo  hijo2">hijo</div>
         <div class="hijo">hijo</div>

        
    </div>
