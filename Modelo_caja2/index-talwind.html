<!DOCTYPE html>

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Document</title>
</head>
<body>
    <!-- CONTENEDOR PADRE -->
    <div class="block
                bg-sky-400
                w-[400px]
                h-[400px] 
                pt-[30px]
                pr-[20px]
                pb-[5px]
                pl-[40px]
                border-double
                border-red-600
                border-[10px]
                rounded-[20px]"> <!-- Añadí redondeado al padre también por si lo necesitas -->
               
        <!-- HIJO AZUL -->
        <div class="block
                    bg-blue-700
                    w-[200px]
                    h-[200px]
                    pt-[20px]
                    pl-[10px]
                    border-r-[10px] 
                    border-dotted
                    border-green-600
                    /* CLASES DE BORDES AQUÍ: */
                    rounded-[20px] 
                    rounded-tl-[40px]
                    /* MARGENES */
                    mt-[20px] 
                    mx-auto">
            hijo
        </div>
    </div>
